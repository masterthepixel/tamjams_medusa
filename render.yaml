# TamJams — Render Blueprint (Medusa backend only)
# Place at the REPO ROOT as `render.yaml`. Render reads it to provision this service.
#
# Architecture: storefront on Vercel, Postgres on Supabase, Medusa server here on
# Render. This blueprint intentionally does NOT provision Postgres or a storefront
# service on Render — those live elsewhere and provisioning them here would cost more.
#
# Cost: $0/month on the `free` plan below. Free web services spin down after ~15min
# idle and kill background jobs — fine for early dev/prototyping. Bump `plan` to
# `starter` ($7/mo) once you need it always-on (real checkout traffic, cron jobs).
#
# Redis/Key Value is intentionally omitted: Medusa v2 falls back to an in-memory
# event bus + workflow engine on a single instance. Add Upstash (or Render Key Value)
# later if you scale past one instance.
#
# ── Two-phase deploy ──────────────────────────────────────────────────────────
# `sync: false` vars come from external services (Supabase, Stripe) or aren't known
# until the storefront is deployed:
#   1. Set DATABASE_URL to the Supabase Postgres connection string (session pooler).
#   2. Deploy this blueprint → the service gets its *.onrender.com URL.
#   3. Deploy the storefront to Vercel separately; note its URL.
#   4. Fill STORE_CORS/AUTH_CORS (Vercel URL), ADMIN_CORS (this service's own URL),
#      and STRIPE_API_KEY in the Render dashboard → redeploy.
# ──────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: tamjams-medusa
    runtime: node
    repo: https://github.com/masterthepixel/tamjams_medusa
    plan: free                 # bump to `starter` ($7/mo) when you need always-on
    region: oregon
    branch: main
    rootDir: apps/medusa       # monorepo path (create-medusa-app layout)
    # Medusa v2 `build` emits a standalone app in .medusa/server that needs its own install.
    # `.medusa/server` sits inside the pnpm workspace, so a bare `pnpm install`
    # there resolves to a workspace install and never links the standalone
    # server's own deps (the `medusa` bin). --ignore-workspace fixes that.
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build && cd .medusa/server && pnpm install --ignore-workspace
    # Free tier can't use preDeployCommand, so migrations run at boot (before start).
    # `pnpm exec`/`pnpm run` resolve the medusa bin from the server's node_modules.
    startCommand: cd .medusa/server && pnpm exec medusa db:migrate && pnpm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"            # Medusa requires Node < 25
      # Supabase Postgres connection string (session pooler) — not provisioned here.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      # CORS: fill with the Vercel storefront URL (STORE/AUTH) and this service's
      # own onrender.com URL (ADMIN) after first deploy.
      - key: STORE_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: ADMIN_CORS
        sync: false
      # Stripe secret key (test key to start). Never commit this.
      - key: STRIPE_API_KEY
        sync: false
