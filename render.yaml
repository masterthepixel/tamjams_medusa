# TamJams — Render Blueprint
# Place at the REPO ROOT as `render.yaml`. Render reads it to provision the whole stack.
# Stack: 1 Postgres + 1 Medusa Web Service + 1 Next.js storefront Web Service.
# Redis/Key Value is intentionally omitted for launch (Medusa v2 falls back to an
# in-memory event bus + workflow engine on a single instance). See the commented block
# at the bottom to add it when you scale past one instance.
#
# ── Two-phase deploy (unavoidable) ────────────────────────────────────────────
# Vars marked `sync: false` can't be known until first deploy:
#   1. Deploy the blueprint → services get their *.onrender.com URLs.
#   2. In Medusa Admin, create a publishable API key + note the URLs.
#   3. Fill the `sync: false` vars in the Render dashboard → redeploy.
# ──────────────────────────────────────────────────────────────────────────────

databases:
  - name: tamjams-db
    databaseName: tamjams
    user: tamjams
    plan: basic-256mb          # smallest paid tier; bump as needed
    postgresMajorVersion: "16"
    region: oregon             # keep all three resources in the SAME region

services:
  # ── Medusa backend (API + admin + background jobs in shared mode) ────────────
  - type: web
    name: tamjams-medusa
    runtime: node
    repo: https://github.com/masterthepixel/tamjams_medusa
    plan: starter              # do NOT use free — it spins down and kills background jobs
    region: oregon
    branch: main
    rootDir: apps/medusa       # monorepo path (create-medusa-app layout)
    # Medusa v2 `build` emits a standalone app in .medusa/server that needs its own install.
    # Adjust if your package.json scripts differ.
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build && cd .medusa/server && pnpm install
    preDeployCommand: cd .medusa/server && pnpm medusa db:migrate
    startCommand: cd .medusa/server && pnpm medusa start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"            # Medusa requires Node < 25; your machine has 25.x
      - key: DATABASE_URL
        fromDatabase:
          name: tamjams-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      # CORS: fill with the storefront URL (STORE/AUTH) and this service's own URL (ADMIN)
      # after first deploy. Example value: https://tamjams-storefront.onrender.com
      - key: STORE_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: ADMIN_CORS
        sync: false
      # Stripe secret key (test key to start). Never commit this.
      - key: STRIPE_API_KEY
        sync: false
      # - key: REDIS_URL          # uncomment when you add Key Value (see bottom)
      #   fromService:
      #     name: tamjams-redis
      #     type: redis
      #     property: connectionString

  # ── Next.js storefront (SSR — must be a Web Service, not a Static Site) ───────
  - type: web
    name: tamjams-storefront
    runtime: node
    repo: https://github.com/masterthepixel/tamjams_medusa
    plan: starter
    region: oregon
    branch: main
    rootDir: apps/storefront
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Point the storefront at the Medusa service. `property: host` yields the bare
      # hostname (no scheme) — prefix https:// in the value you set, or fill via sync:false.
      - key: MEDUSA_BACKEND_URL
        fromService:
          name: tamjams-medusa
          type: web
          property: host        # -> tamjams-medusa.onrender.com  (add https:// where consumed)
      # Publishable key doesn't exist until Medusa is running/seeded — set after phase 2.
      - key: NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false             # e.g. https://tamjams-storefront.onrender.com
      - key: NEXT_PUBLIC_DEFAULT_REGION
        value: us

# ── OPTIONAL: add later, when one instance isn't enough ───────────────────────
# The blueprint token for managed Redis / "Key Value" may be `redis` or `keyvalue`
# depending on Render's current schema — verify in their docs before uncommenting.
#
# services:
#   - type: redis
#     name: tamjams-redis
#     plan: starter
#     region: oregon
#     ipAllowList: []           # empty = internal-only access from your Render services
#     maxmemoryPolicy: noeviction   # Medusa uses Redis for durable jobs — don't evict
