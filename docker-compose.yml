services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tamjams
      POSTGRES_PASSWORD: tamjams
      POSTGRES_DB: tamjams
    ports:
      - "5432:5432"
    volumes:
      - tamjams-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"

volumes:
  tamjams-postgres:
